name: Main Branch CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: main-ci
  cancel-in-progress: false

jobs:
  # ── 0. Compute image tag (matches Jenkins: gitCommit-buildNumber) ─────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Compute Docker image tag
        id: tag
        run: |
          SHORT_SHA="${{ github.sha }}"
          echo "value=${SHORT_SHA:0:7}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  # ── 1. Build & Unit Tests & Coverage ─────────────────────────────────────
  build:
    name: Build & Unit Tests
    needs: setup
    uses: ./.github/workflows/reusable-build.yml
    with:
      java_version: '17'

  # ── 2a. SonarQube scan (parallel with owasp & docker) ────────────────────
  sonar:
    name: SonarQube Scan
    needs: build
    uses: ./.github/workflows/reusable-sonar.yml
    with:
      build_artifact_name: ${{ needs.build.outputs.build_artifact_name }}
      sonar_host_url: ${{ vars.SONAR_HOST_URL }}
      java_version: '17'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 2b. OWASP Dependency Check (parallel with sonar & docker) ────────────
  owasp:
    name: OWASP Dependency Check
    needs: build
    uses: ./.github/workflows/reusable-owasp.yml
    secrets:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  # ── 2c. Docker build → Trivy scan → ECR push (parallel with sonar & owasp)
  docker:
    name: Docker → Trivy → ECR
    needs: [setup, build]
    uses: ./.github/workflows/reusable-docker-ecr.yml
    with:
      artifact_name: ${{ needs.build.outputs.artifact_name }}
      image_tag: ${{ needs.setup.outputs.image_tag }}
      ecr_registry: ${{ vars.ECR_REGISTRY }}
      ecr_repository: ${{ vars.ECR_REPOSITORY }}
      aws_region: ${{ vars.AWS_REGION }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ── 3. Update image tag in k8s/deployment.yaml ───────────────────────────
  update-manifest:
    name: Update Deployment Manifest
    needs: docker
    uses: ./.github/workflows/reusable-update-manifest.yml
    with:
      docker_image: ${{ needs.docker.outputs.image_full_name }}
      ecr_registry: ${{ vars.ECR_REGISTRY }}
      ecr_repository: ${{ vars.ECR_REPOSITORY }}
    permissions:
      contents: write
