name: Reusable – Update Deployment Manifest

on:
  workflow_call:
    inputs:
      docker_image:
        description: Full ECR image URI to write into the manifest (registry/repo:tag)
        type: string
        required: true
      ecr_registry:
        description: ECR registry URL
        type: string
        required: true
      ecr_repository:
        description: ECR repository name
        type: string
        required: true
      manifest_path:
        description: Relative path to the deployment manifest file
        type: string
        default: k8s/deployment.yaml

jobs:
  update-manifest:
    name: Update Image Tag in Manifest
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in ${{ inputs.manifest_path }}
        run: |
          sed -i "s|image: ${{ inputs.ecr_registry }}/${{ inputs.ecr_repository }}:.*|image: ${{ inputs.docker_image }}|" \
            "${{ inputs.manifest_path }}"

          echo "=== Updated manifest ==="
          grep "image:" "${{ inputs.manifest_path }}"

      - name: Commit and push manifest change
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.manifest_path }}"
          git commit -m "ci: update image to ${{ inputs.docker_image }} [skip ci]"
          git push
