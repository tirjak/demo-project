name: Reusable – Docker Build, Trivy Scan & ECR Push

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name of the JAR artifact uploaded by the build job
        type: string
        required: true
      image_tag:
        description: Tag to apply to the Docker image
        type: string
        required: true
      ecr_registry:
        description: ECR registry URL (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com)
        type: string
        required: true
      ecr_repository:
        description: ECR repository name (e.g. semtech_demo_image)
        type: string
        required: true
      aws_region:
        description: AWS region
        type: string
        required: true
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    outputs:
      image_full_name:
        description: Full image URI pushed to ECR (registry/repo:tag)
        value: ${{ jobs.docker.outputs.image_full_name }}

jobs:
  docker:
    name: Docker Build → Trivy → ECR Push
    runs-on: ubuntu-latest
    outputs:
      image_full_name: ${{ steps.meta.outputs.full_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: target/

      - name: Compute full image URI
        id: meta
        run: |
          FULL="${{ inputs.ecr_registry }}/${{ inputs.ecr_repository }}:${{ inputs.image_tag }}"
          echo "full_name=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Image URI: ${FULL}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (linux/amd64 for EKS)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Image Scan (HIGH & CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.full_name }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          output: trivy-report.txt

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-report.txt
          retention-days: 14

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: docker push "${{ steps.meta.outputs.full_name }}"
