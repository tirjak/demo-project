apiVersion: v1
kind: Service
metadata:
  name: demo-project
  labels:
    app: demo-project
spec:
  # LoadBalancer provisions an AWS ELB and makes the app publicly accessible.
  type: LoadBalancer
  selector:
    app: demo-project
  ports:
    - name: http
      protocol: TCP
      port: 80           # external port (browser-facing, no :port needed)
      targetPort: 8080   # Spring Boot app port inside the container
