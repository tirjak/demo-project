# ─────────────────────────────────────────────────────────────────────────────
# Jenkins Credentials — Kubernetes Secret
#
# 1. Fill in every REPLACE_ME value below
# 2. Apply BEFORE deploying the Helm chart:
#      kubectl apply -f k8s/jenkins/secrets.yaml
#
# DO NOT commit this file with real values.
# Add secrets.yaml to .gitignore, or use Sealed Secrets / AWS Secrets Manager.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: jenkins
type: Opaque
stringData:
  # ── GitHub ──────────────────────────────────────────────────────────────────
  # Your GitHub username (e.g. tirjak)
  GITHUB_USER: "REPLACE_ME"

  # Token used for repo checkout  →  maps to Jenkins credential: githubid
  GITHUB_TOKEN: "REPLACE_ME"

  # PAT with repo write scope  →  maps to Jenkins credential: GitHub_cred
  # Used by the Update Manifest stage to push deployment.yaml changes
  GITHUB_PAT: "REPLACE_ME"

  # ── OWASP Dependency Check ──────────────────────────────────────────────────
  # NVD API key  →  maps to Jenkins credential: NVD_API_KEY_OWASP
  # Get one free at: https://nvd.nist.gov/developers/request-an-api-key
  NVD_API_KEY: "REPLACE_ME"

  # ── SonarQube ───────────────────────────────────────────────────────────────
  # SonarQube user token  →  maps to Jenkins credential: sonar-token
  SONAR_TOKEN: "REPLACE_ME"

  # SonarQube server URL reachable from EKS (not localhost)
  # e.g. http://sonarqube.your-domain.com:9000
  SONAR_HOST_URL: "REPLACE_ME"
