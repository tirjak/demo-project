# ─────────────────────────────────────────────────────────────────────────────
# Jenkins Helm Chart Values — EKS deployment
#
# Deploy order:
#   1. kubectl apply -f k8s/jenkins/namespace.yaml
#   2. Fill in secrets.yaml, then: kubectl apply -f k8s/jenkins/secrets.yaml
#   3. helm repo add jenkins https://charts.jenkins.io && helm repo update
#   4. Build & push agent: docker build -t <ECR>/jenkins-agent:latest k8s/jenkins/agent/ && docker push ...
#   5. helm upgrade --install jenkins jenkins/jenkins -n jenkins -f k8s/jenkins/values.yaml
# ─────────────────────────────────────────────────────────────────────────────

controller:
  image:
    repository: jenkins/jenkins
    tag: "2.492-jdk17"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  # No builds run on the controller — all work goes to agent pods
  numExecutors: 0

  # EmptyDir — data is lost on pod restart
  # Switch to persistence.enabled: true + storageClass for production
  persistence:
    enabled: false

  serviceType: ClusterIP

  # ── Inject all credentials from the K8s secret as env vars ─────────────────
  # JCasC reads ${GITHUB_USER}, ${GITHUB_TOKEN}, etc. from these env vars
  envFrom:
    - secretRef:
        name: jenkins-credentials

  # ── Plugins ─────────────────────────────────────────────────────────────────
  # Matches everything used in the current Jenkinsfile
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - credentials-binding:latest
    - sonar:latest
    - dependency-check-jenkins-plugin:latest
    - coverage:latest
    - jacoco:latest
    - junit:latest
    - configuration-as-code:latest
    - pipeline-stage-view:latest
    - docker-workflow:latest
    - timestamper:latest
    - build-timeout:latest

  # ── Jenkins Configuration as Code (JCasC) ───────────────────────────────────
  JCasC:
    configScripts:

      # ── Tool installations ──────────────────────────────────────────────────
      # Mirrors your local Jenkins: Global Tool Configuration
      tools: |
        tool:
          jdk:
            installations:
              - name: "jdk17"
                properties:
                  - installSource:
                      installers:
                        - adoptOpenJdkInstaller:
                            id: "jdk-17.0.11+9"
          maven:
            installations:
              - name: "maven_3.9"
                properties:
                  - installSource:
                      installers:
                        - maven:
                            id: "3.9.6"
          dependency-check:
            installations:
              - name: "OWASP-DC"
                properties:
                  - installSource:
                      installers:
                        - dependencyCheckInstaller:
                            id: "dependency-check-11.1.1"

      # ── Credentials ─────────────────────────────────────────────────────────
      # Mirrors your local Jenkins: Manage Credentials
      # Values come from the jenkins-credentials Kubernetes secret (envFrom above)
      credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      id: "githubid"
                      username: "${GITHUB_USER}"
                      password: "${GITHUB_TOKEN}"
                      description: "GitHub credentials (checkout)"
                      scope: GLOBAL
                  - usernamePassword:
                      id: "GitHub_cred"
                      username: "${GITHUB_USER}"
                      password: "${GITHUB_PAT}"
                      description: "GitHub PAT (manifest push)"
                      scope: GLOBAL
                  - string:
                      id: "NVD_API_KEY_OWASP"
                      secret: "${NVD_API_KEY}"
                      description: "NVD API Key for OWASP Dependency Check"
                      scope: GLOBAL
                  - string:
                      id: "sonar-token"
                      secret: "${SONAR_TOKEN}"
                      description: "SonarQube authentication token"
                      scope: GLOBAL

      # ── SonarQube server ────────────────────────────────────────────────────
      # Mirrors your local Jenkins: Configure System → SonarQube servers
      sonarqube: |
        unclassified:
          sonarGlobalConfiguration:
            buildWrapperEnabled: false
            installations:
              - name: "sonar_server"
                serverUrl: "${SONAR_HOST_URL}"
                credentialsId: "sonar-token"

      # ── Kubernetes Cloud — dynamic agent pods ───────────────────────────────
      # One fresh pod is spawned per build; destroyed after the build completes.
      #
      # Pod has 3 containers:
      #   jnlp  — Jenkins inbound agent (handles controller ↔ agent comms)
      #   build — custom image with JDK17, Maven, Docker CLI, Trivy, AWS CLI
      #   dind  — Docker-in-Docker daemon (EKS uses containerd, no host socket)
      #
      # An init container installs QEMU binfmt so docker buildx can build
      # linux/arm64 images inside the dind container via emulation.
      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: ""
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins:8080"
                jenkinsTunnel: "jenkins-agent:50000"
                containerCap: 10
                templates:
                  - name: "jenkins-agent"
                    label: "jenkins-agent"
                    nodeUsageMode: NORMAL
                    serviceAccount: "jenkins"
                    defaultContainer: "build"
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:jdk17"
                        resourceLimitCpu: "200m"
                        resourceLimitMemory: "256Mi"
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "128Mi"
                      - name: "build"
                        image: "348165962256.dkr.ecr.us-east-1.amazonaws.com/jenkins-agent:latest"
                        command: "cat"
                        ttyEnabled: true
                        resourceLimitCpu: "2"
                        resourceLimitMemory: "2Gi"
                        resourceRequestCpu: "500m"
                        resourceRequestMemory: "1Gi"
                        envVars:
                          # Point Docker CLI at the DinD sidecar (no TLS)
                          - envVar:
                              key: "DOCKER_HOST"
                              value: "tcp://localhost:2375"
                          - envVar:
                              key: "DOCKER_TLS_VERIFY"
                              value: ""
                    volumes:
                      - emptyDirVolume:
                          mountPath: "/home/jenkins/agent"
                          memory: false
                    yaml: |
                      spec:
                        initContainers:
                          # Install QEMU binfmt handlers on the node kernel so
                          # docker buildx can emulate linux/arm64 inside DinD
                          - name: qemu-install
                            image: tonistiigi/binfmt:latest
                            args: ["--install", "all"]
                            securityContext:
                              privileged: true
                        containers:
                          - name: dind
                            image: docker:dind
                            securityContext:
                              privileged: true
                            env:
                              - name: DOCKER_TLS_CERTDIR
                                value: ""
                            volumeMounts:
                              - name: docker-storage
                                mountPath: /var/lib/docker
                        volumes:
                          - name: docker-storage
                            emptyDir: {}

# ── RBAC — controller needs permission to create/delete agent pods ───────────
rbac:
  create: true

serviceAccount:
  create: true
  name: jenkins

# ── Disable the chart's built-in agent (we use JCasC pod templates instead) ──
agent:
  enabled: false
